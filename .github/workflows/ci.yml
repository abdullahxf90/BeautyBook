name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/api
  IMAGE_WEBSITE: ghcr.io/${{ github.repository }}/website

jobs:
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --workspaces --include-workspace-root
      - run: npm run build -w @beautybook/database
      - run: cd apps/api && npx tsc --noEmit
      - run: cd apps/website && npx tsc --noEmit

  test:
    name: Test
    needs: lint-typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: beautybook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --workspaces --include-workspace-root
      - run: npm run build -w @beautybook/database
      - name: Run database migrations
        run: npx prisma db push --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/beautybook_test
      - name: Seed test data
        run: npx ts-node packages/database/prisma/seed.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/beautybook_test
      - name: Start API
        run: |
          npx ts-node-dev --respawn --transpile-only apps/api/src/index.ts &
          sleep 5
          curl -sf http://localhost:4000/health || exit 1
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/beautybook_test
          JWT_SECRET: test-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          API_PORT: "4000"
      - name: Run smoke tests
        run: npm test
        env:
          API_URL: http://localhost:4000
      - name: Run unit tests
        run: node --test tests/*.test.mjs
        env:
          API_URL: http://localhost:4000

  build:
    name: Build Images
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Website image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.website
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
