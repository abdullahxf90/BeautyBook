name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall generates the Prisma client and compiles @beautybook/database
      - name: Install dependencies
        run: npm ci

      - name: Typecheck API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Typecheck website
        run: npx tsc --noEmit
        working-directory: apps/website

      - name: Build website
        run: npx next build
        working-directory: apps/website
        env:
          # Pages fall back gracefully when the API is unreachable at build time
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # API smoke tests (tests/) need a live database + API, so they run locally
  # via `npm test` rather than in CI. Add a postgres service container here
  # if you want them in CI later.
