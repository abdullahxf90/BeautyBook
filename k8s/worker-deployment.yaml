apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: beautybook
  labels:
    app: worker
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        tier: backend
    spec:
      containers:
        - name: worker
          image: ghcr.io/abdullahxf90/beautybook/api:latest
          command: ["node", "apps/api/dist/worker.js"]
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: beautybook-config
            - secretRef:
                name: beautybook-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
