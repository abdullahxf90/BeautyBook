apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: beautybook
  labels:
    app: website
    tier: frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
        tier: frontend
    spec:
      containers:
        - name: website
          image: ghcr.io/abdullahxf90/beautybook/website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.beauty-book.com"
            - name: NEXT_PUBLIC_SUPABASE_URL
              value: "https://imqjwxjmunvnwukajpog.supabase.co"
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: beautybook-secrets
                  key: SUPABASE_ANON_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
